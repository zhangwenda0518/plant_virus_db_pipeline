# ===================================================
# Plant Virus: 4-in-1 Database Server
# ===================================================
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 10M;
    # ---- 1. Plant Virus Reference Database (Static) ----
    location /reference/ {
        alias /opt/plant_virus_db/plant_virus_db_pipeline/docs/;
        index reference_index.html;
        index index.html;
    }
    location /reference/data/ {
        alias /opt/plant_virus_db/plant_virus_db_pipeline/docs/data/;
        expires 1h;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # ---- TE & EVE Database ----
    location /te/ {
        alias /opt/plant_virus_db/plant_virus_db_pipeline/docs/te/;
        index index.html;
        try_files $uri $uri/ /te/index.html;
    }

    # ---- 2. Primer Database Web (Flask) ----
    location /primers/ {
        rewrite ^/primers/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
    # ---- 3. Virus Explorer (Dash) ----
    location /explorer/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_buffering off;
    }
    location /_dash-component-suites/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
    location /_dash-dependencies/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
    location /_dash-update-component/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
    location /_reload-hash/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
    # ---- 4. Knowledge RAG ----
    location /knowledge/ {
        proxy_pass http://127.0.0.1:5002/;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }
    # ---- 5. Literature Tracker ----
    location /literature/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }
    # ---- 6. Metabuli Classification ----
    location /metabuli/ {
        proxy_pass http://127.0.0.1:5004;
        proxy_set_header Host $host;
        client_max_body_size 110m;
        proxy_read_timeout 600s;
    }
    # ---- 7. Virus Vector Host ----
    location /vector/ {
        proxy_pass http://127.0.0.1:5005;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }
    # ---- 8. Virus Profile ----
    location /virus/ {
        proxy_pass http://127.0.0.1:5006;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }
    # ---- NLR-Virus Interaction Atlas ----
    location /nlr_atlas/ {
        rewrite ^/nlr_atlas/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8013;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ---- Root: serve portal page ----
    location = / {
        root /opt/plant_virus_db/plant_virus_db_pipeline/docs;
        try_files /index.html =404;
    }
    # ---- API for primers ----
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
    # ---- Primer Flask internal routes ----
    location /species/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
    location /primer/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
    location = /search {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
    location = /browse {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
    location = /download {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ---- Gene Atlas ----
    location = /genes { return 301 /genes/; }
    location /genes/ {
        alias /opt/plant_virus_db/plant_virus_db_pipeline/docs/genes/;
        index gene_browser.html;
        expires 1h;
    }

    # ---- Help & Resources ----
    location /help/ { alias /opt/plant_virus_db/plant_virus_db_pipeline/docs/help/; index index.html; }
    location = /resources.html {
        alias /opt/plant_virus_db/plant_virus_db_pipeline/docs/resources.html;
    }

    # ---- Photos ----
    location = /photos { return 301 /photos/; }
    location /photos/ {
        alias /opt/plant_virus_db/plant_virus_db_pipeline/docs/;
        index photos.html;
    }
    location /photos/data/ {
        alias /opt/plant_virus_db/plant_virus_db_pipeline/docs/data/;
        expires 1h;
        add_header Access-Control-Allow-Origin *;
    }

    # ---- PAmiRDB ----
    location /pamirdb/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
