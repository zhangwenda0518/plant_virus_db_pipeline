<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Plant TE & EVE Database — Transposons and Endogenous Viral Elements</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;padding:0;background:#f5f5f5;color:#333}
nav{background:#1a5276;color:#fff;padding:0 24px;display:flex;align-items:center;gap:4px;height:52px;position:sticky;top:0;z-index:10}
nav a{color:rgba(255,255,255,.8);text-decoration:none;padding:14px 18px;font-size:14px;border-radius:6px 6px 0 0}
nav a:hover,nav a.active{background:rgba(255,255,255,.15);color:#fff}
nav .brand{font-weight:700;font-size:16px;color:#fff;margin-right:16px;padding:0}
.main{max-width:1400px;margin:0 auto;padding:0 20px}
.hero{background:linear-gradient(135deg,#6C3483,#8E44AD);color:#fff;padding:40px 32px;border-radius:0 0 12px 12px;margin-bottom:24px}
.hero h1{margin:0 0 8px;font-size:26px}
.hero p{margin:0;opacity:.9;font-size:14px;line-height:1.6;max-width:900px}
.intro{background:#fff;padding:24px 28px;border-radius:8px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);line-height:1.7}
.intro h2{margin:0 0 10px;font-size:18px;color:#6C3483}
.intro p{margin:0 0 8px;font-size:14px;color:#555}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;padding:18px 12px;border-radius:8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi .val{font-size:26px;font-weight:700;color:#6C3483}
.kpi .lbl{font-size:11px;color:#888;margin-top:4px}
.card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.card h3{margin:0 0 12px;font-size:15px;color:#6C3483}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
canvas{max-height:340px}
.footer{text-align:center;padding:20px;color:#999;font-size:12px}
.footer a{color:#8E44AD;text-decoration:none}
table.dltbl{width:100%;border-collapse:collapse;font-size:13px}
table.dltbl th{background:#f3e5f5;color:#6C3483;padding:10px 12px;text-align:left;border-bottom:2px solid #e1bee7}
table.dltbl td{padding:10px 12px;border-bottom:1px solid #eee}
table.dltbl tr:hover{background:#faf5fc}
.btn{display:inline-block;padding:8px 20px;background:#8E44AD;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;text-decoration:none;margin:4px}
.btn:hover{background:#7D3C98}
.btn-sm{padding:5px 12px;font-size:11px}
.meta{font-size:12px;color:#999;margin-top:4px}
.tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;margin:2px;font-weight:600}
.tag-purple{background:#f3e5f5;color:#6C3483}
.tag-green{background:#e8f5e9;color:#2e7d32}
.tag-orange{background:#fff3e0;color:#e65100}
.tag-blue{background:#e3f2fd;color:#1565c0}

.srch{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.srch input{padding:8px 14px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:240px}
.srch select{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.srch .cnt{font-size:12px;color:#999;margin-left:auto}
.tbl-wrap{overflow-x:auto;max-height:520px;overflow-y:auto}
.tbl-wrap table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
.tbl-wrap thead{position:sticky;top:0;z-index:2}
<div class="card" id="seqTable">
  <h3>Sequence Browser <span style="font-weight:400;font-size:13px;color:#999">(rvdb.ENRV + rvdb.EX + ncbi.EVE)</span></h3>
  <div class="srch">
    <input type="text" id="teSearch" placeholder="Search accession / organism / description..." oninput="renderTable()">
    <select id="teCatFilter" onchange="renderTable()">
      <option value="all">All Categories</option>
      <option value="rvdb.ENRV">rvdb.ENRV</option>
      <option value="rvdb.EX">rvdb.EX</option>
      <option value="ncbi.EVE">ncbi.EVE</option>
      <option value="ENRV_clean">ENRV_clean</option>
      <option value="EX_clean">EX_clean</option>
    </select>
    <span class="cnt" id="teCnt"></span>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('cat')">Category <span class="arr" id="arr-cat"></span></th>
          <th onclick="sortTable('acc')">Accession <span class="arr" id="arr-acc"></span></th>
          <th onclick="sortTable('org')">Organism <span class="arr" id="arr-org"></span></th>
          <th style="min-width:180px" onclick="sortTable('desc')">Description <span class="arr" id="arr-desc"></span></th>
          <th onclick="sortTable('len')">Length (bp) <span class="arr" id="arr-len"></span></th>
          <th onclick="sortTable('date')">Date <span class="arr" id="arr-date"></span></th>
        </tr>
      </thead>
      <tbody id="teTbody"></tbody>
    </table>
  </div>
  <div class="pager">
    <button id="tePrev" onclick="changePage(-1)">&#8592; Prev</button>
    <span id="tePageInfo">Page 1</span>
    <button id="teNext" onclick="changePage(1)">Next &#8594;</button>
    <span style="margin-left:12px;font-size:11px;color:#999" id="tePageTotal"></span>
  </div>
</div>
