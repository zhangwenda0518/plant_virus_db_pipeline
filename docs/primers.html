<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>引物数据库 — Plant Virus Reference DB</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{--nav-bg:#1a5276;--rec-g:#27ae60;--rec-y:#f39c12;--rec-r:#e74c3c}
body{padding-top:52px;background:#f8f9fa}
.navbar{background:var(--nav-bg)!important;z-index:1030}
.navbar-brand{font-weight:700}
.nav-link{color:rgba(255,255,255,.85)!important;transition:.15s}
.nav-link:hover,.nav-link.active{color:#fff!important;background:rgba(255,255,255,.15)}
.stat-num{font-size:1.8rem;font-weight:700;color:var(--nav-bg)}
.stat-label{font-size:.75rem;color:#6c757d;text-transform:uppercase;letter-spacing:.5px}
.sp-item{cursor:pointer;transition:background .12s;border-radius:6px}
.sp-item:hover{background:#e9ecef}
.sp-item.active{background:#cfe2ff;font-weight:600}
.seq-mono{font-family:'Courier New',monospace;font-size:13px;word-break:break-all}
.primer-table{font-size:13px}
.primer-table th{position:sticky;top:52px;z-index:1}
.type-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff}
.type-pcr{background:#2b8a3e}.type-qpcr{background:#1971c2}
.type-degen{background:#e8590c}.type-tiled{background:#6741d9}
.rec-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.rec-rec{background:#d5f5e3;color:#1e8449}.rec-usable{background:#fef9e7;color:#b7950b}
.rec-not{background:#fadbd8;color:#c0392b}
.dimer-box{font-family:'Consolas','Courier New',monospace;font-size:11px;line-height:1.3;white-space:nowrap;overflow-x:auto;background:#f8f9fa;padding:8px;border-radius:6px}
.tab-btn{cursor:pointer;padding:6px 16px;border:1px solid #dee2e6;background:#fff;border-radius:4px 4px 0 0;margin-right:2px;font-size:13px;transition:.15s}
.tab-btn.active{background:#0d6efd;color:#fff;border-color:#0d6efd;font-weight:600}
.genome-svg{width:100%;border:1px solid #e0e0e0;border-radius:4px;background:#fafafa}
.genome-label{font-size:10px;fill:#868e96}
.spinner-border-sm{width:1rem;height:1rem;border-width:.15em}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:40px;color:#6c757d}
.filter-badge{cursor:pointer;user-select:none;transition:.15s}
.filter-badge:hover{opacity:.8}
.filter-badge.active{box-shadow:0 0 0 2px #fff,0 0 0 4px currentColor}
.sidebar{max-height:calc(100vh - 180px);overflow-y:auto;position:sticky;top:68px}
@media(max-width:768px){.sidebar{position:static;max-height:none}}
</style>

<div class="bg-primary bg-gradient text-white py-4">
<div class="container">
<h2 class="mb-1"><i class="bi bi-droplet"></i> 引物数据库</h2>
<p class="mb-0 opacity-75">植物病毒检测引物 — PCR / qPCR / Degenerate / Tiled 四种策略</p>
</div>
</div>

<!-- Stats -->
<div class="container mt-3"><div class="row g-2" id="statsRow"></div></div>

<!-- Main -->
<div class="container mt-3"><div class="row g-3">
<!-- Sidebar -->
<div class="col-md-3"><div class="card shadow-sm sidebar" style="border-radius:10px">
<div class="card-body p-3">
<h6 class="card-title mb-2"><i class="bi-search"></i> 物种搜索</h6>
<input type="text" class="form-control form-control-sm mb-2" id="searchInp" placeholder="输入物种/科/属..." autocomplete="off">
<div class="d-flex flex-wrap gap-1 mb-2" id="typeFilter">
<button class="btn btn-sm btn-outline-secondary active filter-btn" data-type="all">全部</button>
<button class="btn btn-sm btn-outline-secondary filter-btn" data-type="PCR">PCR</button>
<button class="btn btn-sm btn-outline-secondary filter-btn" data-type="qPCR">qPCR</button>
<button class="btn btn-sm btn-outline-secondary filter-btn" data-type="DEGENERATE">Degen</button>
<button class="btn btn-sm btn-outline-secondary filter-btn" data-type="TILED">Tiled</button>
</div>
<small class="text-muted" id="spCount"></small>
<div id="spList"><div class="loading-overlay"><div class="spinner-border spinner-border-sm me-2"></div>加载中...</div></div>
</div></div></div>

<!-- Content -->
<div class="col-md-9" id="mainContent">
<div class="text-center text-muted py-5">
<i class="bi bi-arrow-left-circle" style="font-size:2rem"></i>
<p class="mt-2">← 左侧选择物种查看引物详情</p>
</div>
</div>
</div></div>

<script>
// ============================ DATA LOADING ============================
const BASE = 'primers';
let spIndex = {}, spStats = {};

(async function init(){
  try{
    const [r1,r2] = await Promise.all([
      fetch(BASE+'/index.json'), fetch(BASE+'/stats.json')
    ]);
    spIndex = await r1.json(); spStats = await r2.json();
  }catch(e){document.getElementById('spList').innerHTML='<p class="text-danger p-2">数据加载失败: '+BASE+'/index.json</p>';return}
  renderStats();
  renderSpList();
})();

function renderStats(){
  const s = spStats;
  const cards = [
    {n:(s.total_pairs||0).toLocaleString(),l:'Total Primers',c:'#1a5276'},
    {n:(s.total_species||0).toLocaleString(),l:'Species',c:'#1a5276'},
    {n:(s.recommended||0).toLocaleString(),l:'Recommended',c:'#27ae60'},
    {n:(s.usable||0).toLocaleString(),l:'Usable',c:'#f39c12'},
    {n:(s.not_recommended||0).toLocaleString(),l:'Not Recommended',c:'#e74c3c'},
    {n:(s.families||0).toLocaleString(),l:'Families',c:'#6c757d'},
  ];
  document.getElementById('statsRow').innerHTML = cards.map(c=>
    `<div class="col-6 col-md-2"><div class="card shadow-sm text-center p-2" style="border-radius:10px"><div class="stat-num" style="color:${c.c}">${c.n}</div><div class="stat-label">${c.l}</div></div></div>`
  ).join('');
}

// ============================ SPECIES LIST ============================
let curFilter = 'all', curSp = null;
document.getElementById('searchInp').addEventListener('input', renderSpList);
document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',function(){
  document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');
  curFilter = this.dataset.type; renderSpList();
}));

function renderSpList(){
  const q = document.getElementById('searchInp').value.toLowerCase();
  let species = Object.entries(spIndex).filter(([n,i])=>{
    if(q && !n.toLowerCase().includes(q) && !(i.family||'').toLowerCase().includes(q) && !(i.genus||'').toLowerCase().includes(q)) return false;
    if(curFilter!=='all'){const k=curFilter==='DEGENERATE'?'degenerate':curFilter==='TILED'?'tiled':curFilter.toLowerCase();if(!i[k])return false}
    return true;
  });
  species.sort((a,b)=>b[1].total-a[1].total);
  const top = species.slice(0,600);
  document.getElementById('spCount').textContent = top.length+' / '+Object.keys(spIndex).length+' 物种';
  const list = document.getElementById('spList');
  list.innerHTML = top.map(([n,i])=>
    `<div class="sp-item p-2 px-2 d-flex justify-content-between align-items-center${curSp===n?' active':''}" data-sp="${esc(n)}" style="font-size:13px">
      <span class="text-truncate me-1">${esc(n)}</span>
      <span class="d-flex gap-1 flex-shrink-0">
        ${i.pcr?`<span class="badge rounded-pill type-pcr">P${i.pcr}</span>`:''}
        ${i.qpcr?`<span class="badge rounded-pill type-qpcr">Q${i.qpcr}</span>`:''}
        ${i.degenerate?`<span class="badge rounded-pill type-degen">D${i.degenerate}</span>`:''}
        ${i.tiled?`<span class="badge rounded-pill type-tiled">T${i.tiled}</span>`:''}
      </span>
    </div>`
  ).join('') || '<p class="text-muted p-2 text-center">无匹配</p>';
  list.querySelectorAll('.sp-item').forEach(el=>el.addEventListener('click',()=>loadSp(el.dataset.sp)));
}

// ============================ SPECIES DETAIL ============================
async function loadSp(name){
  curSp = name; renderSpList();
  document.getElementById('mainContent').innerHTML = '<div class="loading-overlay py-5"><div class="spinner-border spinner-border-sm me-2"></div>加载引物数据...</div>';
  const info = spIndex[name];
  if(!info){document.getElementById('mainContent').innerHTML='<p class="text-danger">未找到物种数据</p>';return}
  const file = info.file || 'species/'+name.replace(/[\/\\\[\]:"*?<>|]/g,'_')+'.json';
  let data;
  try{data = await (await fetch(BASE+'/'+file)).json()}catch(e){document.getElementById('mainContent').innerHTML='<p class="text-danger">加载失败: '+file+'</p>';return}
  renderSpPage(data, info, name);
}

function renderSpPage(data, info, name){
  const primers = data.primers || [];
  // 优先用数据库 genome_length，否则从最大引物位置估算
  let glen = parseInt(data.genome_length) || 0;
  if(!glen && primers.length>0){
    glen = primers.reduce((m,p)=>{const r=parseInt(p.rev_start)||0;return r>m?r:m},0);
    if(glen>0) glen = Math.ceil(glen*1.05); // +5% padding
  }
  // Group
  const types = ['PCR','qPCR','DEGENERATE','TILED'];
  const groups = {}; types.forEach(t=>{groups[t]=primers.filter(p=>p.type===t)});
  // Stats
  const recs = {'RECOMMENDED':0,'PASS':0,'USABLE':0,'CAUTION':0,'NOT_RECOMMENDED':0};
  primers.forEach(p=>{const r=p.recommendation||'';if(r in recs)recs[r]++;else recs[r]=1});
  const tax = [info.family, info.genus].filter(Boolean).join(' > ') || 'N/A';

  let html = `
  <div class="card shadow-sm mb-3" style="border-radius:10px">
    <div class="card-body">
      <h5 class="card-title">${esc(name)}</h5>
      <p class="text-muted mb-1" style="font-size:13px">${tax}${glen>0?' | 基因组: '+glen.toLocaleString()+' bp':''}</p>
      <div class="d-flex flex-wrap gap-2 align-items-center mb-2">
        ${types.map(t=>groups[t].length?`<span class="badge rounded-pill type-${t==='PCR'?'pcr':t==='qPCR'?'qpcr':t==='DEGENERATE'?'degen':'tiled'}">${t}: ${groups[t].length}</span>`:'').join('')}
        ${recs['RECOMMENDED']||recs['PASS']?`<span class="rec-badge rec-rec">REC ${recs['RECOMMENDED']+recs['PASS']}</span>`:''}
        ${recs['USABLE']||recs['CAUTION']?`<span class="rec-badge rec-usable">CAUTION ${recs['USABLE']+recs['CAUTION']}</span>`:''}
        ${recs['NOT_RECOMMENDED']?`<span class="rec-badge rec-not">NOT ${recs['NOT_RECOMMENDED']}</span>`:''}
      </div>
  `;

  // Genome viz
  if(glen > 0 && primers.some(p=>p.fwd_start && p.rev_start)){
    html += renderGenomeViz(primers, glen);
  }

  // Tabs + Table
  html += `
      <div class="d-flex flex-wrap mb-2">
        <button class="tab-btn active" data-sp-tab="all">All (${primers.length})</button>
        ${types.map(t=>`<button class="tab-btn" data-sp-tab="${t}">${t==='DEGENERATE'?'Degenerate':t} (${groups[t].length})</button>`).join('')}
      </div>
      <div class="table-responsive">
        <table class="table table-hover primer-table" id="primerTbl">
          <thead class="table-dark"><tr>
            <th>类型</th><th>区段</th><th>Fwd (5→3)</th><th>Rev (5→3)</th>
            <th>Tm F/R</th><th>产物</th><th>GC%</th><th>评分</th><th>推荐</th><th>特异%</th><th>详情</th>
          </tr></thead>
          <tbody id="primerTbody"></tbody>
        </table>
      </div>
    </div>
  </div>`;
  document.getElementById('mainContent').innerHTML = html;

  // Tab switching
  document.querySelectorAll('[data-sp-tab]').forEach(b=>b.addEventListener('click',function(){
    document.querySelectorAll('[data-sp-tab]').forEach(x=>x.classList.remove('active'));this.classList.add('active');
    showTable(this.dataset.spTab, primers, groups);
  }));
  showTable('all', primers, groups);
}

function showTable(tab, primers, groups){
  const show = tab==='all'?primers:(groups[tab]||[]);
  document.getElementById('primerTbody').innerHTML = show.map((p,i)=>
    `<tr>
      <td><span class="type-badge type-${p.type==='PCR'?'pcr':p.type==='qPCR'?'qpcr':p.type==='DEGENERATE'?'degen':'tiled'}">${p.type==='DEGENERATE'?'Degen':p.type}</span></td>
      <td>${esc(p.segment||'')}</td>
      <td><span class="seq-mono">${esc((p.fwd_seq||'').substring(0,30))}${(p.fwd_seq||'').length>30?'...':''}</span></td>
      <td><span class="seq-mono">${esc((p.rev_seq||'').substring(0,30))}${(p.rev_seq||'').length>30?'...':''}</span></td>
      <td>${p.fwd_tm||'-'}/${p.rev_tm||'-'}</td>
      <td>${p.product||'-'}</td>
      <td>${p.gc_fwd||'-'}/${p.gc_rev||'-'}</td>
      <td>${p.score||'-'}</td>
      <td>${recHtml(p.recommendation||'')}</td>
      <td>${p.specificity||'-'}%</td>
      <td><button class="btn btn-sm btn-outline-primary" onclick="toggleDetail(event,${i})" data-idx="${i}">详情</button></td>
    </tr>`
  ).join('')||'<tr><td colspan="11" class="text-center text-muted">无数据</td></tr>';
}

// ============================ GENOME VIZ (SVG) ============================
function renderGenomeViz(primers, glen){
  const cols = {PCR:{f:'#2b8a3e',l:'#d3f9d8'},qPCR:{f:'#1971c2',l:'#d0ebff'},DEGENERATE:{f:'#e8590c',l:'#ffe8cc'},TILED:{f:'#6741d9',l:'#e8d9ff'}};
  const svgW = 800; const trackH = 16; const padL = 60; const padR = 20;
  const w = svgW - padL - padR;

  // Filter valid primers with positions
  const valid = primers.filter(p=>{const fp=parseInt(p.fwd_start)||0;const rp=parseInt(p.rev_start)||0;return fp>0&&rp>fp});
  const types = ['PCR','qPCR','DEGENERATE','TILED'];
  const grouped = {}; types.forEach(t=>{grouped[t]=valid.filter(p=>p.type===t)});

  let maxY = 2;
  types.forEach(t=>{const n=grouped[t].length;if(n>0)maxY+=trackH*n+26});
  const svgH = maxY + 30;

  let svg = `<svg class="genome-svg mb-2" viewBox="0 0 ${svgW} ${svgH}" style="max-width:100%">`;
  svg += `<text x="${padL}" y="14" font-size="12" font-weight="700" fill="#1a5276">基因组覆盖度图 (${glen.toLocaleString()} bp)</text>`;

  // Scale bar
  svg += `<line x1="${padL}" y1="${svgH-8}" x2="${padL+w}" y2="${svgH-8}" stroke="#ccc" stroke-width="1"/>`;
  svg += `<text x="${padL}" y="${svgH-12}" class="genome-label">1 bp</text>`;
  svg += `<text x="${padL+w/2-20}" y="${svgH-12}" class="genome-label">${Math.round(glen/2).toLocaleString()} bp</text>`;
  svg += `<text x="${padL+w-30}" y="${svgH-12}" class="genome-label">${glen.toLocaleString()} bp</text>`;

  let y = 20;
  for(const t of types){
    const arr = grouped[t]; if(!arr.length) continue;
    const c = cols[t];
    svg += `<text x="5" y="${y+10}" font-size="11" font-weight="700" fill="${c.f}">${t}</text>`;
    svg += `<text x="5" y="${y+22}" font-size="9" fill="#868e96">${arr.length}</text>`;
    for(let i=0;i<arr.length;i++){
      const p = arr[i]; const fp = parseInt(p.fwd_start); const rp = parseInt(p.rev_start);
      const x1 = padL + (fp/glen)*w; const x2 = padL + (rp/glen)*w;
      const pw = Math.max(2,(p.fwd_seq||'').length/glen*w); const rw = Math.max(2,(p.rev_seq||'').length/glen*w);
      const by = y + i*trackH;
      // Product line
      svg += `<rect x="${x1}" y="${by+5}" width="${x2-x1}" height="2" fill="${c.l}" rx="1" opacity="0.7"/>`;
      // Fwd block
      svg += `<rect x="${x1}" y="${by}" width="${pw}" height="8" fill="${c.f}" rx="2" opacity="0.85"><title>${p.pair_id||''}: Fwd ${fp}-${fp+(p.fwd_seq||'').length}</title></rect>`;
      // Rev block
      const revX = x2-rw;
      svg += `<rect x="${revX>0?revX:1}" y="${by}" width="${rw}" height="8" fill="${c.f}" rx="2" opacity="0.5"><title>${p.pair_id||''}: Rev ${rp-(p.rev_seq||'').length}-${rp}</title></rect>`;
    }
    y += arr.length*trackH + 22;
  }
  svg += `</svg>`;
  return `<h6 class="mt-3 mb-2">基因组引物覆盖图 (${glen.toLocaleString()} bp)</h6>${svg}`;
}

// ============================ RECOMMENDATION ============================
function recHtml(r){
  if(r==='RECOMMENDED'||r==='PASS') return '<span class="rec-badge rec-rec">REC</span>';
  if(r==='USABLE'||r==='CAUTION') return '<span class="rec-badge rec-usable">CAUTION</span>';
  if(r==='NOT_RECOMMENDED') return '<span class="rec-badge rec-not">NOT</span>';
  return r||'-';
}

// ============================ PRIMER DETAIL (dimers) ============================
function toggleDetail(evt, idx){
  const btn = evt.target;
  // Remove existing detail row
  const tr = btn.closest('tr'); const next = tr.nextElementSibling;
  if(next && next.classList.contains('detail-row')){next.remove();btn.textContent='详情';return}

  // Get primers data from current species
  const show = Array.from(document.querySelectorAll('#primerTbody tr')).map(r=>{
    const tds = r.querySelectorAll('td'); return tds.length>2?tds[2].textContent:null;
  }).filter(Boolean);

  // Find primer data from stored global
  if(!_curPrimers || idx >= _curPrimers.length) return;
  const p = _curPrimers[idx];

  // Compute dimers
  const fdDimer = dimerViz(p.fwd_seq||'', 'Fwd Self-Dimer');
  const revDimer = dimerViz(p.rev_seq||'', 'Rev Self-Dimer');
  const crossDimer = crossDimerViz(p.fwd_seq||'', p.rev_seq||'');

  const row = document.createElement('tr');
  row.classList.add('detail-row');
  row.innerHTML = `<td colspan="11" style="background:#f8f9fa;padding:12px 16px">
    <div><strong>Fwd:</strong> <span style="font-family:monospace;font-size:13px">${esc(p.fwd_seq||'')}</span> (${(p.fwd_seq||'').length}bp)</div>
    <div class="mt-1"><strong>Rev:</strong> <span style="font-family:monospace;font-size:13px">${esc(p.rev_seq||'')}</span> (${(p.rev_seq||'').length}bp)</div>
    ${p.probe_seq?`<div class="mt-1"><strong>Probe:</strong> <span style="font-family:monospace;font-size:13px;color:#1971c2">${esc(p.probe_seq)}</span></div>`:''}
    <div class="mt-2"><strong>位置:</strong> ${p.fwd_start||'-'} - ${p.rev_start||'-'} | <strong>产物:</strong> ${p.product||'-'}bp | <strong>GC:</strong> ${p.gc_fwd||'-'}/${p.gc_rev||'-'}% | <strong>特异:</strong> ${p.specificity||'-'}% | <strong>脱靶风险:</strong> ${p.plant_risk||'NONE'}</div>
    ${p.degen?`<div class="mt-1"><strong>简并度:</strong> ${p.degen}</div>`:''}
    ${fdDimer||revDimer||crossDimer?`<div class="mt-2"><strong>二聚体分析:</strong>${fdDimer}${revDimer}${crossDimer}</div>`:''}
  </td>`;
  tr.after(row);
  btn.textContent = '收起';
}

let _curPrimers = [];
// Override showTable to store primers
const origShowTable = showTable;
showTable = function(tab, primers, groups){
  _curPrimers = primers;
  origShowTable(tab, primers, groups);
};

// ============================ DIMER VIZ (client-side) ============================
function dimerViz(seq, label, maxLen=12){
  if(!seq||seq.length<3) return '';
  // Reverse complement
  const comp = {A:'T',T:'A',G:'C',C:'G',U:'A',R:'Y',Y:'R',M:'K',K:'M',S:'S',W:'W',B:'V',V:'B',D:'H',H:'D',N:'N'};
  const rc = seq.split('').reverse().map(c=>comp[c]||c).join('');
  // Find longest self-complementary
  let bestLen=0,bestStart=0,bestRc=0;
  for(let i=0;i<seq.length;i++)for(let j=i+3;j<=Math.min(i+maxLen,seq.length);j++){
    const sub=seq.substring(i,j);const ri=rc.indexOf(sub);
    if(ri>=0&&j-i>bestLen){bestLen=j-i;bestStart=i;bestRc=ri}
  }
  if(bestLen<3) return '';
  const conn = ' '.repeat(bestStart)+'|'.repeat(bestLen)+' '.repeat(seq.length-bestStart-bestLen);
  return `<div class="dimer-box mt-1"><b>${label}</b> (${bestLen}bp)<br>
5' <span style="color:#e03131">${seq.substring(0,bestStart)}</span><span style="background:#ffe3e3;color:#c92a2a;font-weight:700">${seq.substring(bestStart,bestStart+bestLen)}</span><span style="color:#e03131">${seq.substring(bestStart+bestLen)}</span> 3'<br>
&nbsp;&nbsp;&nbsp;<span style="color:#2b8a3e;font-weight:700">${conn.substring(0,bestStart)}${'|'.repeat(bestLen)}${conn.substring(bestStart+bestLen)}</span><br>
3' <span style="color:#1971c2">${rc.substring(0,bestRc)}</span><span style="background:#d0ebff;color:#1864ab;font-weight:700">${rc.substring(bestRc,bestRc+bestLen)}</span><span style="color:#1971c2">${rc.substring(bestRc+bestLen)}</span> 5'</div>`;
}

function crossDimerViz(fwd, rev, maxLen=12){
  if(!fwd||!rev||fwd.length<3||rev.length<3) return '';
  const comp = {A:'T',T:'A',G:'C',C:'G',U:'A',R:'Y',Y:'R',M:'K',K:'M',S:'S',W:'W',B:'V',V:'B',D:'H',H:'D',N:'N'};
  const rcRev = rev.split('').reverse().map(c=>comp[c]||c).join('');
  let bestLen=0,bestFwd=0,bestRc=0;
  for(let i=0;i<fwd.length;i++)for(let j=i+3;j<=Math.min(i+maxLen,fwd.length);j++){
    const sub=fwd.substring(i,j);const ri=rcRev.indexOf(sub);
    if(ri>=0&&j-i>bestLen){bestLen=j-i;bestFwd=i;bestRc=ri}
  }
  if(bestLen<3) return '';
  const conn = ' '.repeat(bestFwd)+'|'.repeat(bestLen)+' '.repeat(Math.max(0,fwd.length-bestFwd-bestLen));
  return `<div class="dimer-box mt-1"><b>Fwd-Rev Cross-Dimer</b> (${bestLen}bp)<br>
5' <span style="color:#e03131">${fwd.substring(0,bestFwd)}</span><span style="background:#ffe3e3;color:#c92a2a;font-weight:700">${fwd.substring(bestFwd,bestFwd+bestLen)}</span><span style="color:#e03131">${fwd.substring(bestFwd+bestLen)}</span> 3' (Fwd)<br>
&nbsp;&nbsp;&nbsp;<span style="color:#2b8a3e;font-weight:700">${' '.repeat(bestFwd)}${'|'.repeat(bestLen)}</span><br>
3' <span style="color:#1971c2">${rcRev.substring(0,bestRc)}</span><span style="background:#d0ebff;color:#1864ab;font-weight:700">${rcRev.substring(bestRc,bestRc+bestLen)}</span><span style="color:#1971c2">${rcRev.substring(bestRc+bestLen)}</span> 5' (Rev rc)</div>`;
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
