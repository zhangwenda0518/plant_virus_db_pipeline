name: Weekly Literature Update

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC (14:00 Beijing)
  workflow_dispatch:       # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run weekly fetch + summarize + build
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          cd 7.literature_tracker
          python pipeline.py auto --days 7 --source keyword,elink
          python pipeline.py digest-weekly --weeks-back 8
          python pipeline.py digest-monthly --start $(date -d '2 months ago' +%Y-%m) --end $(date +%Y-%m)

      - name: Deploy to docs/literature
        run: |
          mkdir -p docs/literature
          cp -r 7.literature_tracker/web/* docs/literature/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 7.literature_tracker/data/ 7.literature_tracker/web/data/ docs/literature/
          git diff --staged --quiet || git commit -m "Weekly literature update $(date +%Y-%m-%d)"
          git push
